<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anas | Portfolio & Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --main-color: #38bdf8;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            text-align: center;
        }

        h1 {
            color: var(--main-color);
            cursor: pointer;
            user-select: none;
            font-size: 2.5rem;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            border: 1px solid #334155;
            text-align: right;
        }

        .link-btn {
            display: block;
            background: #334155;
            color: white;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .link-btn:hover {
            background: var(--main-color);
            color: #000;
        }

        /* لوحة التحكم */
        #adminPanel {
            display: none;
            background: #000;
            padding: 25px;
            border: 2px solid var(--main-color);
            margin: 30px 0;
            border-radius: 20px;
        }

        input, textarea {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #111;
            color: white;
            font-family: 'Cairo';
        }

        button {
            background: var(--main-color);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="container">
        <h1 onclick="checkAdmin()">Anas</h1>
        <p style="color: #94a3b8;">مرحباً بك في ملفي الشخصي ومدونتي</p>

        <div id="linksContainer">
            <p>جاري تحميل الروابط...</p>
        </div>

        <h3 style="margin-top: 40px; border-bottom: 2px solid var(--card-bg); padding-bottom: 10px;">الشروحات والمدونات ✍️</h3>
        <div id="blogsContainer">
            <p>جاري تحميل المدونات...</p>
        </div>

        <div id="adminPanel">
            <h3 style="color: var(--main-color);">لوحة التحكم 🛠️</h3>
            <input type="text" id="title" placeholder="العنوان">
            <input type="text" id="url" placeholder="الرابط (URL)">
            <textarea id="desc" rows="3" placeholder="الوصف (للمدونات فقط)"></textarea>
            <br>
            <button onclick="saveData('links')">إضافة كـ رابط</button>
            <button onclick="saveData('blogs')" style="background: #22c55e;">نشر كـ مدونة</button>
        </div>
    </div>

    <script>
        // إعدادات فايربيز لمشروعك AnasPortfolio
        const firebaseConfig = {
            apiKey: "AIzaSyC-NoKeyRequiredForPublicRTDB",
            authDomain: "anasportfolio-c3316.firebaseapp.com",
            databaseURL: "https://anasportfolio-c3316-default-rtdb.firebaseio.com/",
            projectId: "anasportfolio-c3316",
        };

        // بدء الاتصال
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // جلب وعرض البيانات
        function loadData() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val();
                
                // تحديث الروابط
                let linksHtml = '';
                if (data && data.links) {
                    Object.keys(data.links).reverse().forEach(key => {
                        const l = data.links[key];
                        linksHtml += `<a href="${l.url}" target="_blank" class="link-btn">${l.title}</a>`;
                    });
                }
                document.getElementById('linksContainer').innerHTML = linksHtml || "<p>لا توجد روابط مضافة</p>";

                // تحديث المدونات
                let blogsHtml = '';
                if (data && data.blogs) {
                    Object.keys(data.blogs).reverse().forEach(key => {
                        const b = data.blogs[key];
                        blogsHtml += `
                            <div class="card">
                                <h4>${b.title}</h4>
                                <p style="color:#94a3b8; font-size:14px;">${b.desc}</p>
                                <a href="${b.url}" target="_blank" style="color:var(--main-color); text-decoration:none;">اقرأ المزيد ←</a>
                            </div>`;
                    });
                }
                document.getElementById('blogsContainer').innerHTML = blogsHtml || "<p>لا توجد مدونات مضافة</p>";
            }, (error) => {
                console.error(error);
                alert("خطأ في الاتصال بقاعدة البيانات!");
            });
        }

        // دالة الحفظ مع تنبيهات مؤكدة
        function saveData(type) {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            const desc = document.getElementById('desc').value;

            if (!title || !url) {
                alert("أدخل العنوان والرابط يا أنس!");
                return;
            }

            db.ref(type).push({
                title: title,
                url: url,
                desc: desc || "",
                time: Date.now()
            })
            .then(() => {
                alert("تم الحفظ بنجاح! 🚀");
                document.getElementById('title').value = '';
                document.getElementById('url').value = '';
                document.getElementById('desc').value = '';
            })
            .catch((err) => {
                alert("فشل الحفظ: " + err.message);
            });
        }

        // حركة الدخول السرية
        let clicks = 0;
        function checkAdmin() {
            clicks++;
            if (clicks === 5) {
                const pass = prompt("كلمة السر:");
                if (pass === "123") {
                    document.getElementById('adminPanel').style.display = 'block';
                } else {
                    alert("خطأ!");
                }
                clicks = 0;
            }
            setTimeout(() => { clicks = 0; }, 3000);
        }

        // تشغيل الجلب عند التحميل
        loadData();
    </script>
</body>
</html>
