<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anas | Portfolio & Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --main-color: #38bdf8;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-gray: #94a3b8;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: auto;
            text-align: center;
        }

        h1 {
            color: var(--main-color);
            cursor: pointer;
            font-size: 2.5rem;
            margin-bottom: 10px;
            user-select: none;
        }

        .subtitle {
            color: var(--text-gray);
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            border: 1px solid #334155;
            text-align: right;
            transition: 0.3s;
        }

        .link-btn {
            display: block;
            background: #334155;
            color: white;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .link-btn:hover {
            background: var(--main-color);
            color: #000;
            transform: translateY(-3px);
        }

        /* لوحة التحكم السرية */
        #adminPanel {
            display: none;
            background: #000;
            padding: 25px;
            border: 2px solid var(--main-color);
            margin: 30px 0;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        input, textarea {
            width: 95%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #111;
            color: white;
            font-family: 'Cairo';
        }

        button {
            background: var(--main-color);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Cairo';
            margin: 5px;
        }

        button:active { transform: scale(0.95); }

        .tag {
            background: var(--main-color);
            color: black;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 onclick="checkAdmin()">Anas</h1>
        <p class="subtitle">مطور برمجيات وألعاب | Software Developer</p>

        <div id="linksContainer">
            <p>جاري تحميل الروابط...</p>
        </div>

        <h3 style="margin-top: 40px; border-bottom: 2px solid var(--card-bg); padding-bottom: 10px;">آخر الشروحات والمدونات ✍️</h3>
        <div id="blogsContainer">
            <p>جاري تحميل المدونات...</p>
        </div>

        <div id="adminPanel">
            <h3 style="color: var(--main-color);">لوحة التحكم السرية 🛠️</h3>
            <input type="text" id="title" placeholder="اسم المنصة أو عنوان الشرح">
            <input type="text" id="url" placeholder="الرابط (URL)">
            <textarea id="desc" rows="3" placeholder="الوصف (للمدونات فقط)"></textarea>
            <br>
            <button onclick="saveData('links')">إضافة كـ رابط</button>
            <button onclick="saveData('blogs')" style="background: #22c55e;">نشر كـ مدونة</button>
            <button onclick="document.getElementById('adminPanel').style.display='none'" style="background: #64748b;">إغلاق</button>
        </div>
    </div>

    <script>
        // 1. إعدادات فايربيز الخاصة بك
        const firebaseConfig = {
            databaseURL: "https://anasportfolio-c3316-default-rtdb.firebaseio.com/"
        };

        // 2. تشغيل فايربيز
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // 3. دالة جلب البيانات (تشتغل تلقائياً)
        function loadData() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val();
                
                // تحديث الروابط
                let linksHtml = '';
                if (data && data.links) {
                    Object.keys(data.links).reverse().forEach(key => {
                        const link = data.links[key];
                        linksHtml += `<a href="${link.url}" target="_blank" class="link-btn">${link.title}</a>`;
                    });
                    document.getElementById('linksContainer').innerHTML = linksHtml;
                } else {
                    document.getElementById('linksContainer').innerHTML = "<p style='color:#64748b'>لا توجد روابط مضافة</p>";
                }

                // تحديث المدونات
                let blogsHtml = '';
                if (data && data.blogs) {
                    Object.keys(data.blogs).reverse().forEach(key => {
                        const blog = data.blogs[key];
                        blogsHtml += `
                            <div class="card">
                                <span class="tag">شرح جديد</span>
                                <h4>${blog.title}</h4>
                                <p style="color:var(--text-gray); font-size:14px;">${blog.desc}</p>
                                <a href="${blog.url}" target="_blank" style="color:var(--main-color); text-decoration:none; font-weight:bold;">اقرأ المزيد ←</a>
                            </div>`;
                    });
                    document.getElementById('blogsContainer').innerHTML = blogsHtml;
                } else {
                    document.getElementById('blogsContainer').innerHTML = "<p style='color:#64748b'>لا توجد شروحات مضافة</p>";
                }
            }, (error) => {
                console.error("فشل في قراءة البيانات:", error);
                alert("مشكلة في الاتصال بفايربيز، تأكد من الـ Rules!");
            });
        }

        // 4. دالة الحفظ
        function saveData(type) {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            const desc = document.getElementById('desc').value;

            if (!title || !url) {
                alert("يا أنس، لازم تملا الخانات الأساسية!");
                return;
            }

            db.ref(type).push({
                title: title,
                url: url,
                desc: desc || "",
                date: new Date().toISOString()
            }).then(() => {
                alert("تم الحفظ بنجاح! 🚀");
                document.getElementById('title').value = '';
                document.getElementById('url').value = '';
                document.getElementById('desc').value = '';
            }).catch((err) => {
                alert("خطأ في الحفظ: " + err.message);
            });
        }

        // 5. نظام الدخول السري
        let clicks = 0;
        function checkAdmin() {
            clicks++;
            if (clicks === 5) {
                const pass = prompt("كلمة السر السرية:");
                if (pass === "123") {
                    document.getElementById('adminPanel').style.display = 'block';
                    document.getElementById('adminPanel').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("كلمة سر خاطئة!");
                }
                clicks = 0;
            }
            // ريست للضغطات لو اتأخر
            setTimeout(() => { clicks = 0; }, 3000);
        }

        // تشغيل الجلب عند فتح الصفحة
        loadData();
    </script>
</body>
</html>
