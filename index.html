<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنس | COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg: #020617;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --card-bg: #0f172a;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container { max-width: 500px; margin: auto; }

        .header {
            text-align: center;
            margin: 40px 0;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            letter-spacing: 2px;
        }

        .tagline { color: var(--neon-blue); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0.8; }

        .link-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 18px;
            margin: 15px 0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .link-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            transform: translateX(-5px);
        }

        .blog-item {
            background: var(--card-bg);
            border-radius: 15px;
            margin: 15px 0;
            border: 1px solid rgba(157, 80, 187, 0.2);
            transition: 0.3s;
        }

        .blog-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .blog-header h4 { margin: 0; font-size: 1.1rem; color: #fff; display: flex; align-items: center; gap: 10px; }

        .blog-content {
            max-height: 0;
            padding: 0 20px;
            overflow: hidden;
            transition: all 0.5s ease;
            color: #94a3b8;
            line-height: 1.7;
        }

        .blog-content.active {
            max-height: 1000px;
            padding: 10px 20px 25px 20px;
            border-top: 1px solid rgba(157, 80, 187, 0.1);
        }

        .blog-content a { color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); text-decoration: none; }

        .btn-visit {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border-radius: 10px;
            color: #fff !important;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
            cursor: pointer;
        }

        h3 { color: var(--neon-purple); text-shadow: 0 0 5px var(--neon-purple); margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>أنس</h1>
            <div class="tagline">Developer • Cyber Geek</div>
        </div>
        
        <div id="linksContainer"></div>
        
        <h3><i class="fa-solid fa-code"></i> المدونات والتقارير</h3>
        <div id="blogsContainer"></div>
    </div>

    <script>
        const config = { databaseURL: "https://anasportfolio-c3316-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function linkify(text) {
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
        }

        // دالة تسجيل الضغطة وفتح الرابط
        function handleAction(type, id, url) {
            if(!url) return;
            const ref = db.ref(`${type}/${id}/clicks`);
            ref.transaction((current) => (current || 0) + 1);
            window.open(url, '_blank');
        }

        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            
            let lHtml = '';
            if(data?.links) {
                Object.keys(data.links).reverse().forEach(id => {
                    const l = data.links[id];
                    lHtml += `
                    <div onclick="handleAction('links', '${id}', '${l.url}')" class="link-card">
                        <span><i class="fa-solid fa-bolt" style="color:var(--neon-blue); margin-left:10px"></i> ${l.title}</span>
                        <i class="fa-solid fa-chevron-left" style="font-size:0.8rem; opacity:0.5"></i>
                    </div>`;
                });
            }
            document.getElementById('linksContainer').innerHTML = lHtml || "Connecting...";

            let bHtml = '';
            if(data?.blogs) {
                Object.keys(data.blogs).reverse().forEach(id => {
                    const b = data.blogs[id];
                    const hasLink = b.url && b.url.trim() !== "";
                    const index = id; // استخدمنا الـ ID الفعلي للتعامل مع الـ Toggle
                    
                    bHtml += `
                        <div class="blog-item">
                            <div class="blog-header" onclick="toggleBlog('${id}')">
                                <h4><i class="fa-solid fa-terminal" style="color:var(--neon-purple)"></i> ${b.title}</h4>
                                <i class="fa-solid fa-plus" id="icon-${id}" style="font-size:0.8rem; transition:0.3s"></i>
                            </div>
                            <div class="blog-content" id="content-${id}">
                                <div>${linkify(b.desc)}</div>
                                ${hasLink ? `<div onclick="handleAction('blogs', '${id}', '${b.url}')" class="btn-visit">الدخول للمصدر</div>` : ''}
                            </div>
                        </div>`;
                });
            }
            document.getElementById('blogsContainer').innerHTML = bHtml || "No Data.";
        });

        function toggleBlog(id) {
            const content = document.getElementById(`content-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            content.classList.toggle('active');
            icon.style.transform = content.classList.contains('active') ? 'rotate(45deg)' : 'rotate(0deg)';
        }
    </script>
</body>
</html>
