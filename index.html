<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANAS | NEXT-GEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --glow: #00f2ff;
            --accent: #7000ff;
            --bg: #020617;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 550px; margin: auto; }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-in;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .tagline { color: var(--glow); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; }

        /* Links Design */
        .link-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 18px;
            margin: 15px 0;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #fff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-card:hover {
            transform: scale(1.03);
            border-color: var(--glow);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* Blog Design (Accordion) */
        .blog-item {
            background: var(--glass);
            border-radius: 20px;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        .blog-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .blog-header:hover { background: rgba(255,255,255,0.05); }

        .blog-header h4 { margin: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }

        .blog-content {
            max-height: 0;
            padding: 0 20px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0, 1, 0, 1);
            color: #cbd5e1;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .blog-content.active {
            max-height: 2000px;
            padding: 10px 20px 25px 20px;
            transition: all 0.5s cubic-bezier(1, 0, 1, 0);
        }

        .blog-content a { color: var(--glow); text-decoration: none; border-bottom: 1px dashed; }

        .btn-visit {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: var(--accent);
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <h1>ANAS</h1>
            <div class="tagline">Developer • Creator • Visionary</div>
        </div>
        
        <div id="linksContainer"></div>
        
        <h3 style="margin: 40px 0 20px; padding-right: 10px;"><i class="fa-solid fa-terminal" style="color:var(--glow)"></i> Logs & Intelligence</h3>
        <div id="blogsContainer"></div>
    </div>

    <script>
        const config = { databaseURL: "https://anasportfolio-c3316-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function linkify(text) {
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
        }

        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            
            let lHtml = '';
            if(data?.links) {
                Object.values(data.links).reverse().forEach(l => {
                    lHtml += `
                    <a href="${l.url}" target="_blank" class="link-card">
                        <span><i class="fa-solid fa-link" style="margin-left:10px; color:var(--glow)"></i> ${l.title}</span>
                        <i class="fa-solid fa-chevron-left" style="font-size:0.8rem; opacity:0.5"></i>
                    </a>`;
                });
            }
            document.getElementById('linksContainer').innerHTML = lHtml || "Searching for connections...";

            let bHtml = '';
            if(data?.blogs) {
                Object.values(data.blogs).reverse().forEach((b, i) => {
                    bHtml += `
                        <div class="blog-item">
                            <div class="blog-header" onclick="toggleBlog(${i})">
                                <h4><i class="fa-solid fa-microchip" style="color:var(--accent)"></i> ${b.title}</h4>
                                <i class="fa-solid fa-plus" id="icon-${i}" style="transition:0.3s"></i>
                            </div>
                            <div class="blog-content" id="content-${i}">
                                <div>${linkify(b.desc)}</div>
                                <a href="${b.url}" target="_blank" class="btn-visit">OPEN RESOURCE</a>
                            </div>
                        </div>`;
                });
            }
            document.getElementById('blogsContainer').innerHTML = bHtml || "No logs found.";
        });

        function toggleBlog(id) {
            const content = document.getElementById(`content-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            content.classList.toggle('active');
            icon.style.transform = content.classList.contains('active') ? 'rotate(45deg)' : 'rotate(0deg)';
        }
    </script>
</body>
</html>
